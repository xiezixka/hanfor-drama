name: Build Desktop Apps

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build installer
        run: npm run dist:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: hanfor-ai-windows-installer
          path: |
            release/*.exe
            release/*.blockmap

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build DMG
        run: npm run dist:mac

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: hanfor-ai-macos-dmg
          path: |
            release/*.dmg
            release/*.blockmap

  publish-release:
    needs:
      - build-windows
      - build-mac
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete desktop-v1.0.0 --yes --cleanup-tag || true
          files="$(find installers -type f \( -name '*.exe' -o -name '*.dmg' \) -print)"
          gh release create desktop-v1.0.0 $files \
            --target "${GITHUB_SHA}" \
            --title "涵锋AI桌面安装包 v1.0.0" \
            --notes "包含 Windows 安装包和 macOS Apple Silicon DMG。macOS 版本未做 Apple 开发者签名，首次打开时如提示无法验证开发者，请右键应用选择“打开”。"
